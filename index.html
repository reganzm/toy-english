<!DOCTYPE html>
<html lang="zh-CN" class="h-dvh min-h-0 w-full overflow-hidden">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>玩具英语 · 打字守城</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body
    class="m-0 box-border min-h-dvh h-dvh w-full max-w-[100vw] overflow-hidden overscroll-none antialiased"
  >
    <div id="app" class="flex h-dvh min-h-0 w-full max-w-[100vw] flex-col overflow-hidden">
      <header
        class="grid shrink-0 grid-cols-1 gap-2 border-b border-white/5 px-[max(0.5rem,env(safe-area-inset-left))] py-2 pe-[max(0.5rem,env(safe-area-inset-right))] pt-[max(0.5rem,env(safe-area-inset-top))] sm:grid-cols-[minmax(0,1fr)_minmax(0,2fr)_minmax(0,1fr)] sm:items-center sm:gap-3 sm:border-b-0 sm:px-3 sm:py-2 sm:pt-2"
      >
        <div class="flex flex-col gap-1.5 sm:flex-row sm:flex-wrap sm:items-center sm:gap-x-2 sm:gap-y-1 sm:justify-start">
          <label class="flex flex-wrap items-center gap-1.5">
            <span class="label shrink-0">模式</span>
            <select
              id="game-mode"
              class="select-mode"
              title="地狱：只听 TTS；困难：TTS+中文；入门：TTS+中英文对照"
            >
              <option value="2" selected>入门（中英对照）</option>
              <option value="1">困难（听写+中文）</option>
              <option value="0">地狱（盲听写）</option>
            </select>
          </label>
          <div class="flex flex-wrap items-center gap-x-1.5 gap-y-1">
            <span class="label">关卡</span>
            <span id="level-num">1</span>
            <span class="sep">·</span>
            <span class="label">积分</span>
            <span id="score">0</span>
          </div>
        </div>
        <div class="min-w-0 text-center">
          <div class="flex min-h-7 flex-wrap items-center justify-center gap-2">
            <span id="lives" class="lives" title="生命"></span>
            <span id="combo-pill" class="combo-pill" hidden>
              <span class="combo-label">连击</span>
              <span id="combo-num">0</span>
              <span class="combo-x">×</span>
              <span id="combo-mult">1</span>
            </span>
            <span id="fever-badge" class="fever-badge" hidden>狂热</span>
          </div>
          <div id="prompt-line" class="prompt"></div>
          <div id="typed-line" class="typed" aria-live="polite"></div>
        </div>
        <div class="flex flex-wrap items-center justify-end gap-2 sm:justify-end">
          <button
            type="button"
            id="btn-settings"
            class="btn-settings"
            aria-label="打开设置"
            aria-expanded="false"
            aria-controls="settings-overlay"
          >
            <svg class="btn-settings-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span>设置</span>
          </button>
        </div>
      </header>
      <main
        class="relative flex min-h-0 min-w-0 flex-1 flex-col pb-[env(safe-area-inset-bottom,0px)] pt-0"
      >
        <div
          class="stage-wrap relative isolate min-h-0 min-w-0 w-full flex-1 overflow-hidden bg-[#121a30]"
        >
          <canvas
            id="game"
            width="960"
            height="540"
            class="absolute inset-0 block h-full w-full object-contain"
          ></canvas>
          <div id="toast" class="toast" hidden></div>
        </div>
      </main>
    </div>
    <div id="settings-overlay" class="settings-overlay" aria-hidden="true">
      <div
        class="settings-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="settings-title"
        tabindex="-1"
      >
        <div class="settings-header">
          <h2 id="settings-title">设置</h2>
          <button type="button" id="btn-settings-close" class="settings-close" aria-label="关闭设置">
            ✕
          </button>
        </div>
        <div class="settings-body">
          <div class="settings-row">
            <div class="settings-row-text">
              <span class="settings-label">语音朗读</span>
              <span class="settings-hint">听写与过关时朗读英文（浏览器 Web Speech API）</span>
            </div>
            <button type="button" id="btn-tts" class="btn settings-tts-btn" title="开关英文朗读">
              朗读开
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="modal-overlay" class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-labelledby="modal-title">
        <h2 id="modal-title">通关</h2>
        <div id="modal-body" class="modal-body">
          <div id="modal-body-wasm"></div>
          <div id="modal-body-analysis" class="modal-body-analysis"></div>
        </div>
        <button type="button" id="btn-next" class="btn primary">下一关</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
